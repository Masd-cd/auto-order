<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasD VPNStore - Riwayat Pembelian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        ::-webkit-scrollbar { display: none; }
        #loading-overlay {
            position: fixed; inset: 0; background-color: #0f172a; z-index: 50;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex justify-center p-4 pb-12 relative">

    <div id="loading-overlay">
        <svg class="animate-spin h-8 w-8 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest animate-pulse">Memuat Data...</p>
    </div>

    <div id="main-content" class="w-full max-w-md space-y-4 relative hidden">
        <div class="flex items-center mb-6 pt-4 sticky top-0 bg-[#0f172a] z-10 pb-4 border-b border-[#334155]">
            <a href="index.html" class="card hover:bg-[#334155] text-slate-300 px-3 py-2 rounded-xl text-xs font-bold mr-4 transition shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>
            <h2 class="text-xl font-bold text-slate-100 tracking-tight">Riwayat Pembelian</h2>
        </div>

        <p class="text-[11px] text-slate-400 mb-4 bg-indigo-500/10 p-3 rounded-xl border border-indigo-500/20">
            *Silahkan lihat detail akun dan riwayat pembelian anda disini.
        </p>

        <div id="list-riwayat" class="space-y-3">
            </div>

        <div class="mt-12 mb-8 text-center pt-8 border-t border-[#334155]/50">
            <p class="text-[11px] text-slate-400 font-medium tracking-wide">
                &copy; Built by <span class="text-slate-300 font-bold">MasD VPNStore</span> 2026.
            </p>
            <p class="text-[10px] text-slate-500 mt-1">
                Supported API by Agung Tunneling & Potato Tunneling.
            </p>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://smxmdqdbtcfsnefkstdc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNteG1kcWRidGNmc25lZmtzdGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjQwMjQsImV4cCI6MjA5MDEwMDAyNH0.4hxe-CqEjBL6ymZ6QCFYppC6fsJWKx1r-aA3jQvSJz8';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUserId = null;
    let dataRiwayatGlobal = [];

    // --- FUNGSI GLOBAL ---
    window.toggleDetail = function(elementId) {
        const el = document.getElementById(elementId);
        if(el) {
            if (el.classList.contains('hidden')) {
                document.querySelectorAll('[id^="detail-"]').forEach(d => d.classList.add('hidden'));
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }
    };

    window.lanjutBayar = async function(invoice, harga, event) {
        event.stopPropagation();
        
        const btn = event.currentTarget;
        const teksAsli = btn.innerHTML;
        btn.innerHTML = `<svg class="animate-spin h-4 w-4 mr-2 inline" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memuat QRIS...`;
        btn.disabled = true;

        let totalHarga = harga || 5000; 

        try {
            const response = await fetch('/api/buat_qris', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: invoice, amount: totalHarga })
            });

            const resQris = await response.json();

            if (resQris.status === 'sukses') {
                sessionStorage.setItem('qris_resume', JSON.stringify({
                    invoice: invoice,
                    qris_string: resQris.qris_string,
                    total_bayar: resQris.total_bayar
                }));
                window.location.href = 'ssh.html?resume=true';
            } else {
                alert("Gagal memuat ulang QRIS: " + (resQris.alasan || "Silakan buat pesanan baru."));
                btn.innerHTML = teksAsli;
                btn.disabled = false;
            }
        } catch (error) {
            console.error(error);
            alert("Terjadi kesalahan jaringan.");
            btn.innerHTML = teksAsli;
            btn.disabled = false;
        }
    };

    window.downloadTXT = function(index, event) {
        event.stopPropagation();
        const item = dataRiwayatGlobal[index];
        if (!item) return alert("Data tidak ditemukan.");

        const isiTeks = `=== AKUN MASD VPNSTORE ===\nLayanan: ${item.layanan}\nServer: ${item.server}\nUsername: ${item.username_vpn || '-'}\nPassword: ${item.password_vpn || '-'}\nHost/IP: ${item.host_vpn || '-'}\nExpired: ${item.expired_vpn || '-'}\n\n=== LINK AKUN ===\n[TLS]\n${item.link_tls || '-'}\n\n[NON-TLS]\n${item.link_ntls || '-'}\n\nTerima kasih telah berbelanja di MasD VPNStore!`;
        
        const blob = new Blob([isiTeks], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = `${item.layanan.replace(/\s/g, '')}-${item.username_vpn || 'akun'}.txt`;
        anchor.href = window.URL.createObjectURL(blob);
        anchor.click();
    };

    // --- FUNGSI BARU: HAPUS RIWAYAT KADALUARSA ---
    window.hapusRiwayat = async function(id, event) {
        event.stopPropagation(); // Biar card ga ikut nutup pas diklik
        
        if(confirm("Yakin ingin menghapus riwayat kadaluarsa ini dari daftar?")) {
            const btn = event.currentTarget;
            const teksAsli = btn.innerHTML;
            btn.innerHTML = "Menghapus...";
            btn.disabled = true;

            try {
                // Trik: Ubah status jadi 'deleted' (disembunyikan dari layar)
                await db.from('transaksi_pembelian').update({ status: 'deleted' }).eq('id', id);
                
                // Refresh list riwayat
                tarikDataRiwayat();
            } catch (err) {
                console.error("Gagal hapus:", err);
                alert("Gagal menghapus riwayat.");
                btn.innerHTML = teksAsli;
                btn.disabled = false;
            }
        }
    };

    // --- FUNGSI UTAMA ---
    async function initRiwayat() {
        try {
            const { data: authData, error: authError } = await db.auth.getSession();
            if (authError || !authData.session) {
                window.location.href = 'login.html';
                return;
            } 
            
            currentUserId = authData.session.user.id;
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden');

            await tarikDataRiwayat();
        } catch (err) {
            console.error("Gagal inisialisasi riwayat:", err);
            window.location.href = 'login.html';
        }
    }

    async function tarikDataRiwayat() {
        const container = document.getElementById('list-riwayat');
        container.innerHTML = `<div class="text-center text-slate-500 text-sm mt-8 animate-pulse">Mengambil data dari server...</div>`;

        try {
            // TARIK DATA TAPI KECUALIKAN YANG STATUSNYA 'deleted'
            const { data, error } = await db
                .from('transaksi_pembelian')
                .select('*')
                .eq('id_user', currentUserId)
                .neq('status', 'deleted') 
                .order('waktu_order', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-500 text-sm mt-12 font-medium bg-[#1e293b] py-8 rounded-3xl border border-[#334155]">Belum ada riwayat transaksi.</div>`;
                return;
            }

            const waktuSekarang = new Date();
            dataRiwayatGlobal = [];
            let html = '';

            for (let i = 0; i < data.length; i++) {
                let item = data[i];

                if (item.status === 'pending') {
                    const batasBayar = new Date(item.batas_bayar);
                    if (waktuSekarang > batasBayar) {
                        item.status = 'expired';
                        db.from('transaksi_pembelian').update({ status: 'expired' }).eq('id', item.id);
                    }
                }
                
                dataRiwayatGlobal.push(item);

                const tgl = new Date(item.waktu_order);
                const formatTgl = tgl.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                const formatJam = tgl.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                let warnaStatus, bgStatus, labelStatus, borderKiri, kontenTersembunyi;

                if (item.status === 'success') {
                    warnaStatus = 'text-emerald-400'; bgStatus = 'bg-emerald-400/10'; borderKiri = 'bg-emerald-500'; labelStatus = 'LUNAS / AKTIF';
                    kontenTersembunyi = `
                        <div class="mt-4 pt-4 border-t border-[#334155]/50 space-y-2">
                            <div class="bg-[#0f172a] p-3 rounded-xl border border-[#334155]">
                                <div class="flex justify-between text-[11px] mb-1"><span class="text-slate-500">Username</span> <span class="font-mono text-slate-200 font-bold">${item.username_vpn || '-'}</span></div>
                                <div class="flex justify-between text-[11px] mb-1"><span class="text-slate-500">Password</span> <span class="font-mono text-slate-200 font-bold">${item.password_vpn || '-'}</span></div>
                                <div class="flex justify-between text-[11px] mb-1"><span class="text-slate-500">Host / IP</span> <span class="font-mono text-slate-200 font-bold">${item.host_vpn || '-'}</span></div>
                                <div class="flex justify-between text-[11px] mt-2 pt-2 border-t border-[#334155]/50"><span class="text-slate-500">Expired</span> <span class="text-yellow-400 font-bold">${item.expired_vpn || '-'}</span></div>
                            </div>
                            <button onclick="downloadTXT(${i}, event)" class="w-full mt-2 bg-indigo-600/20 border border-indigo-500/30 py-2.5 rounded-xl text-xs font-bold text-indigo-400 hover:bg-indigo-600/40 transition flex items-center justify-center">
                                Download Detail (TXT)
                            </button>
                        </div>
                    `;
                } else if (item.status === 'pending') {
                    warnaStatus = 'text-amber-400'; bgStatus = 'bg-amber-400/10'; borderKiri = 'bg-amber-500'; labelStatus = 'MENUNGGU PEMBAYARAN';
                    let sisaMenit = Math.max(0, Math.floor((new Date(item.batas_bayar) - waktuSekarang) / 60000));
                    kontenTersembunyi = `
                        <div class="mt-4 pt-4 border-t border-[#334155]/50 text-center">
                            <p class="text-[10px] text-slate-400 mb-2 leading-relaxed">Waktu tersisa: <span class="text-rose-400 font-bold">${sisaMenit} Menit</span>. Segera selesaikan pembayaran.</p>
                            <button onclick="lanjutBayar('${item.no_invoice}', ${item.harga}, event)" class="w-full bg-amber-500 hover:bg-amber-600 text-[#0f172a] font-extrabold py-2.5 rounded-xl text-xs transition shadow-lg shadow-amber-500/20">
                                Lanjutkan Pembayaran (QRIS)
                            </button>
                        </div>
                    `;
                } else {
                    warnaStatus = 'text-rose-400'; bgStatus = 'bg-rose-400/10'; borderKiri = 'bg-rose-500'; labelStatus = 'BATAL / KADALUARSA';
                    kontenTersembunyi = `
                        <div class="mt-4 pt-4 border-t border-[#334155]/50 text-center">
                            <p class="text-[10px] text-rose-500/80 italic mb-3">Waktu pembayaran telah habis atau pesanan dibatalkan. Silakan buat pesanan baru.</p>
                            
                            <button onclick="hapusRiwayat('${item.id}', event)" class="w-full bg-rose-500/10 border border-rose-500/30 py-2.5 rounded-xl text-xs font-bold text-rose-500 hover:bg-rose-500/20 transition flex items-center justify-center">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                Hapus Riwayat Ini
                            </button>
                        </div>
                    `;
                }

                html += `
                <div class="card p-4 rounded-3xl relative overflow-hidden transition hover:border-indigo-500/30 cursor-pointer group" onclick="toggleDetail('detail-${i}')">
                    <div class="absolute top-0 left-0 w-1 h-full ${borderKiri}"></div>
                    <div class="flex justify-between items-start mb-3 pl-2 border-b border-[#334155]/50 pb-3">
                        <div><span class="text-[10px] font-bold text-indigo-400 bg-indigo-400/10 px-2 py-1 rounded-md uppercase tracking-wider">${item.layanan}</span></div>
                        <div class="text-right">
                            <div class="text-[10px] text-slate-400 font-medium">${formatTgl}</div>
                            <div class="text-[9px] text-slate-500">${formatJam} WIB</div>
                        </div>
                    </div>
                    <div class="pl-2 space-y-1">
                        <div class="text-[11px] text-slate-400 font-mono flex justify-between items-center">
                            <span>INV: ${item.no_invoice.substring(0, 12)}...</span>
                            <svg class="w-4 h-4 text-slate-500 group-hover:text-indigo-400 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                        <div class="text-sm font-bold text-slate-200">Server: ${item.server}</div>
                        <div class="flex justify-between items-end mt-4 pt-2">
                            <div class="text-[15px] text-slate-200 font-bold">Rp ${item.harga.toLocaleString('id-ID')}</div>
                            <span class="text-[9px] font-bold ${warnaStatus} ${bgStatus} px-2.5 py-1 rounded-full tracking-widest">${labelStatus}</span>
                        </div>
                    </div>
                    <div id="detail-${i}" class="hidden">
                        ${kontenTersembunyi}
                    </div>
                </div>
                `;
            }
            container.innerHTML = html;
        } catch (error) {
            console.error("Error tarik data:", error);
            container.innerHTML = `<div class="text-center text-rose-500 text-sm mt-12 font-medium">Gagal memuat riwayat dari server.</div>`;
        }
    }

    initRiwayat();
</script>
</body>
</html>
