<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akun Berhasil Dibuat!</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: monospace; text-align: center; padding: 20px; }
        #kotak-akun { background: #1e293b; border: 1px solid #10b981; padding: 20px; border-radius: 8px; display: inline-block; text-align: left; margin-top: 20px; display: none; }
        .loading { color: #f59e0b; font-size: 18px; margin-top: 50px; }
        .label { color: #94a3b8; margin-right: 10px; }
        .value { color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Transaksi Berhasil 🎉</h1>
    
    <div id="status" class="loading">Sedang memproses akun Anda di server Singapore... Mohon tunggu sebentar.</div>

    <div id="kotak-akun">
        <h2 style="color: #10b981; margin-top: 0; text-align: center;">Detail Akun Premium</h2>
        <p><span class="label">Username :</span> <span class="value" id="res-user"></span></p>
        <p><span class="label">Password :</span> <span class="value" id="res-pass"></span></p>
        <p><span class="label">Host/IP  :</span> <span class="value" id="res-host"></span></p>
        <p><span class="label">Expired  :</span> <span class="value" id="res-exp"></span></p>
        <p><span class="label">Port SSH :</span> <span class="value">80 (WS), 443 (SSL)</span></p>
    </div>

    <script>
        const orderId = localStorage.getItem('masd_order_id');
        let percobaan = 0;

        if (!orderId) {
            document.getElementById('status').innerText = "Order ID tidak ditemukan.";
        } else {
            // Cek ke Vercel setiap 3 detik sampai akunnya jadi
            const intervalCek = setInterval(async () => {
                percobaan++;
                const req = await fetch(`/api/cek_akun?order_id=${orderId}`);
                const res = await req.json();

                if (res.status === 'sukses') {
                    clearInterval(intervalCek);
                    document.getElementById('status').style.display = 'none';
                    document.getElementById('kotak-akun').style.display = 'inline-block';
                    
                    document.getElementById('res-user').innerText = res.akun.username;
                    document.getElementById('res-pass').innerText = res.akun.password;
                    document.getElementById('res-host').innerText = res.akun.hostname || "167.172.73.230";
                    document.getElementById('res-exp').innerText = res.akun.exp;
                    
                    // Hapus memori agar tidak bentrok orderan berikutnya
                    localStorage.removeItem('masd_order_id'); 
                } else if (percobaan > 10) {
                    clearInterval(intervalCek);
                    document.getElementById('status').innerText = "Waktu habis. Silakan hubungi admin MasD.";
                    document.getElementById('status').style.color = "red";
                }
            }, 3000);
        }
    </script>
</body>
</html>
