<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasD VPNStore - Update Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm space-y-6 fade-in-up">
        
        <div class="flex flex-col items-center justify-center mb-6 mt-1 text-center">
            <div class="bg-indigo-600/20 p-3 rounded-2xl border border-indigo-500/30 mb-4 shadow-[0_0_15px_rgba(99,102,241,0.3)]">
                <svg class="w-7 h-7 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-blue-400 to-cyan-400 tracking-tight">MasD VPNStore</h1>

            <div class="w-12 h-12 bg-[#1e293b] rounded-xl border border-[#334155] flex items-center justify-center text-2xl mx-auto mt-5 mb-3 shadow-[0_0_15px_rgba(99,102,241,0.2)]">
                🔑
            </div>
            
            <h2 class="text-2xl font-bold text-slate-100 tracking-tight mt-0">Buat Password Baru</h2>
            <p class="text-xs text-slate-400 mt-2 px-6 leading-relaxed">Silakan ketik password baru minimal 6 karakter untuk akun Anda.</p>
        </div>

        <div class="card p-6 rounded-3xl shadow-xl space-y-4">
            
            <div id="alert-box" class="hidden text-[11px] font-bold px-4 py-3 rounded-xl flex items-start text-left shadow-lg transition-all mb-4">
                <div id="alert-icon" class="mt-0.5 mr-2"></div>
                <span id="alert-text" class="leading-relaxed"></span>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-wider pl-1">Password Baru</label>
                <input type="password" id="new-password" placeholder="Minimal 6 karakter" class="w-full bg-[#0f172a] border border-[#334155] text-slate-100 text-sm rounded-2xl px-4 py-3 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition placeholder-slate-600">
            </div>

            <button id="btn-update" onclick="simpanPassword()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-2xl transition shadow-[0_0_15px_rgba(99,102,241,0.3)] mt-2">
                Simpan Password Baru
            </button>
        </div>

        <div class="mt-8 text-center pb-2">
            <p class="text-[11px] text-slate-400 font-medium tracking-wide">
                &copy; Built by MasD VPNStore 2026.
            </p>
            <p class="text-[10px] text-slate-600 mt-1">
                Supported API by Agung Tunneling & Potato Tunneling.
            </p>
        </div>
    </div>

<script>
    // KUNCI RAHASIA SUPABASE MASD
    const SUPABASE_URL = 'https://smxmdqdbtcfsnefkstdc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNteG1kcWRidGNmc25lZmtzdGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjQwMjQsImV4cCI6MjA5MDEwMDAyNH0.4hxe-CqEjBL6ymZ6QCFYppC6fsJWKx1r-aA3jQvSJz8';
    
    // Inisialisasi Supabase Client
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Fungsi Pengendali Notifikasi (Inline Alert)
    function tampilkanAlert(pesan, tipe = 'error') {
        const alertBox = document.getElementById('alert-box');
        const alertText = document.getElementById('alert-text');
        const alertIcon = document.getElementById('alert-icon');
        
        // Reset Class Dasar
        alertBox.className = 'text-[11px] font-bold px-4 py-3 rounded-xl flex items-start text-left shadow-lg transition-all mb-4';
        
        if(tipe === 'error') {
            alertBox.classList.add('bg-rose-500/10', 'border', 'border-rose-500/30', 'text-rose-400');
            alertIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
        } else if (tipe === 'success') {
            alertBox.classList.add('bg-emerald-500/10', 'border', 'border-emerald-500/30', 'text-emerald-400');
            alertIcon.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
        }

        alertText.innerText = pesan;
        alertBox.classList.remove('hidden');
    }

    async function simpanPassword() {
        const newPass = document.getElementById('new-password').value.trim();
        const btn = document.getElementById('btn-update');
        const alertBox = document.getElementById('alert-box');

        // Sembunyikan alert sebelumnya
        alertBox.classList.add('hidden');

        if(newPass.length < 6) {
            tampilkanAlert("Password terlalu pendek! Minimal harus 6 karakter.", "error");
            return;
        }

        // Ubah tombol jadi loading
        btn.innerText = "Menyimpan Data...";
        btn.disabled = true;
        btn.classList.add('opacity-50');

        try {
            // Karena pembeli masuk lewat link khusus dari email, Supabase sudah otomatis mengenali siapa mereka
            const { data, error } = await db.auth.updateUser({ password: newPass });
            
            if (error) throw error;

            tampilkanAlert("Password berhasil diubah! Mengalihkan ke halaman login...", "success");
            
            // Tunggu 2.5 detik, lalu lempar kembali ke halaman Login
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2500);

        } catch (error) {
            tampilkanAlert("Gagal mengubah password: " + error.message, "error");
            
            // Kembalikan tombol ke semula
            btn.innerText = "Simpan Password Baru";
            btn.disabled = false;
            btn.classList.remove('opacity-50');
        }
    }
</script>
</body>
</html>
