<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasD VPNStore | Premium Server</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        .kotak-produk { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 12px; display: inline-block; margin: 10px; width: 250px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .kotak-produk h2 { color: #38bdf8; margin-top: 0; }
        .harga { font-size: 24px; font-weight: bold; margin: 15px 0; color: #10b981; }
        button { background: #3b82f6; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <h1>⚡ MasD VPNStore</h1>
    <p>Server: Singapore (Premium SSH)</p>
    
    <div class="kotak-produk">
        <h2>SSH 15 Hari</h2>
        <div class="harga">Rp 5.000</div>
        <button onclick="beli('5000', '15')">Beli via QRIS</button>
    </div>

    <div class="kotak-produk">
        <h2>SSH 30 Hari</h2>
        <div class="harga">Rp 10.000</div>
        <button onclick="beli('10000', '30')">Beli via QRIS</button>
    </div>

    <script>
        function beli(nominal, durasi) {
            const slug = "masd"; 
            const orderId = `SSH-${durasi}-${Date.now()}`; 
            
            // Simpan Order ID di memori browser pembeli
            localStorage.setItem('masd_order_id', orderId); 
            
            window.location.href = `https://app.pakasir.com/pay/${slug}/${nominal}?order_id=${orderId}&qris_only=1`;
        }
    </script>
</body>
</html>
