<script>
    // KUNCI RAHASIA SUPABASE MASD
    const SUPABASE_URL = 'https://smxmdqdbtcfsnefkstdc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNteG1kcWRidGNmc25lZmtzdGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjQwMjQsImV4cCI6MjA5MDEwMDAyNH0.4hxe-CqEjBL6ymZ6QCFYppC6fsJWKx1r-aA3jQvSJz8';
    
    // Inisialisasi Supabase
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // SISTEM SATPAM (Session Checker)
    async function cekLoginStatus() {
        try {
            // Ambil sesi login dari memori browser
            const { data, error } = await db.auth.getSession();
            
            if (error || !data.session) {
                // Kalau KTP nggak ada/kadaluarsa, tendang ke halaman login
                window.location.href = 'login.html';
            } else {
                // Kalau KTP valid, tampilkan konten toko
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                
                // Bonus: Tampilkan email user di header
                const userEmail = data.session.user.email;
                const sapaan = document.getElementById('teks-sapaan');
                sapaan.innerText = `Halo, ${userEmail}`;
                sapaan.classList.remove('hidden');
            }
        } catch (err) {
            window.location.href = 'login.html';
        }
    }

    // Jalankan Satpam otomatis pas web dibuka
    cekLoginStatus();

    // SISTEM LOGOUT
    async function prosesLogout() {
        if(confirm("Yakin ingin keluar dari akun?")) {
            await db.auth.signOut();
            window.location.href = 'login.html';
        }
    }
</script>
