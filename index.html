<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasD VPNStore | Singapore</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f4;}
        .produk { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin: 10px;}
        button { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;}
    </style>
</head>
<body>
    <h1>MasD VPNStore</h1>
    <p>Server: Singapore (Premium SSH)</p>
    
    <div class="produk">
        <h2>SSH 15 Hari</h2>
        <p>Harga: Rp 5.000</p>
        <button onclick="beli('5000', '15')">Beli via QRIS</button>
    </div>

    <div class="produk">
        <h2>SSH 30 Hari</h2>
        <p>Harga: Rp 10.000</p>
        <button onclick="beli('10000', '30')">Beli via QRIS</button>
    </div>

    <script>
        function beli(nominal, durasi) {
            const slug = "masd"; 
            
            // Format Order ID: SSH-DURASI-WAKTU (Contoh: SSH-15-170123456)
            const orderId = `SSH-${durasi}-${Date.now()}`; 
            
            window.location.href = `https://app.pakasir.com/pay/${slug}/${nominal}?order_id=${orderId}&qris_only=1`;
        }
    </script>
</body>
</html>
